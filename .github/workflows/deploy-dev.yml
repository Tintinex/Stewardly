name: Deploy Dev

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  id-token: write   # Required for OIDC
  contents: read

jobs:
  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    outputs:
      api-url: ${{ steps.cdk-outputs.outputs.api-url }}
      user-pool-id: ${{ steps.cdk-outputs.outputs.user-pool-id }}
      user-pool-client-id: ${{ steps.cdk-outputs.outputs.user-pool-client-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}
          role-session-name: StewardlyDeploy

      - name: Install infra dependencies
        working-directory: infra
        run: npm ci

      - name: CDK Bootstrap (idempotent)
        working-directory: infra
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGION=${{ secrets.AWS_REGION || 'us-east-1' }}
          npx cdk bootstrap aws://${ACCOUNT_ID}/${REGION} || true
        env:
          CDK_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: CDK Deploy All Stacks
        working-directory: infra
        run: |
          npx cdk deploy --all \
            --context stage=dev \
            --require-approval never \
            --outputs-file cdk-outputs.json \
            --progress events
        env:
          CDK_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Extract CDK outputs
        id: cdk-outputs
        working-directory: infra
        run: |
          API_URL=$(cat cdk-outputs.json | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); const k=Object.keys(d).find(k=>k.includes('Api')); console.log(d[k]?.ApiUrl||'')" 2>/dev/null || echo '')
          USER_POOL_ID=$(cat cdk-outputs.json | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); const k=Object.keys(d).find(k=>k.includes('Auth')); console.log(d[k]?.UserPoolId||'')" 2>/dev/null || echo '')
          CLIENT_ID=$(cat cdk-outputs.json | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); const k=Object.keys(d).find(k=>k.includes('Auth')); console.log(d[k]?.UserPoolClientId||'')" 2>/dev/null || echo '')
          echo "api-url=${API_URL}" >> $GITHUB_OUTPUT
          echo "user-pool-id=${USER_POOL_ID}" >> $GITHUB_OUTPUT
          echo "user-pool-client-id=${CLIENT_ID}" >> $GITHUB_OUTPUT

  deploy-app:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Build Next.js app
        working-directory: app
        run: npm run build
        env:
          NEXT_PUBLIC_USE_MOCK: 'false'
          NEXT_PUBLIC_API_URL: ${{ needs.deploy-infra.outputs.api-url }}
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ needs.deploy-infra.outputs.user-pool-id }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ needs.deploy-infra.outputs.user-pool-client-id }}
          NEXT_PUBLIC_AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Deploy to Vercel
        working-directory: app
        run: |
          npm install -g vercel
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} \
            --env NEXT_PUBLIC_USE_MOCK=false \
            --env NEXT_PUBLIC_API_URL=${{ needs.deploy-infra.outputs.api-url }} \
            --env NEXT_PUBLIC_COGNITO_USER_POOL_ID=${{ needs.deploy-infra.outputs.user-pool-id }} \
            --env NEXT_PUBLIC_COGNITO_CLIENT_ID=${{ needs.deploy-infra.outputs.user-pool-client-id }} \
            --env NEXT_PUBLIC_AWS_REGION=${{ secrets.AWS_REGION || 'us-east-1' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

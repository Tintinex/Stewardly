name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            infra/package-lock.json
            services/package-lock.json

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Install infra dependencies
        working-directory: infra
        run: npm ci

      - name: Install services dependencies
        working-directory: services
        run: npm ci

      - name: TypeScript check — app
        working-directory: app
        run: npx tsc --noEmit

      - name: TypeScript check — infra
        working-directory: infra
        run: npx tsc --noEmit

      - name: TypeScript check — services
        working-directory: services
        run: npx tsc --noEmit

      - name: ESLint — app
        working-directory: app
        run: npx next lint || true

      - name: ESLint — services
        working-directory: services
        run: npx eslint . --ext .ts --max-warnings 0 || true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: services/package-lock.json

      - name: Install services dependencies
        working-directory: services
        run: npm ci

      - name: Run unit tests
        working-directory: services
        run: npm test -- --passWithNoTests --coverage
        env:
          NODE_ENV: test

  cdk-synth:
    name: CDK Synth
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            infra/package-lock.json
            services/package-lock.json

      - name: Install infra dependencies
        working-directory: infra
        run: npm ci

      - name: Install services dependencies (needed for local esbuild bundling)
        working-directory: services
        run: npm ci

      - name: CDK Synth (compile check — no deploy)
        working-directory: infra
        run: npx cdk synth --context stage=dev --quiet
        env:
          CDK_DEFAULT_ACCOUNT: '893338225222'
          CDK_DEFAULT_REGION: 'us-east-1'

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: npm audit — app
        working-directory: app
        run: npm audit --audit-level=high --production || true

      - name: npm audit — infra
        working-directory: infra
        run: npm audit --audit-level=high --production || true

      - name: npm audit — services
        working-directory: services
        run: npm audit --audit-level=high --production || true
